<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Assistente de Chamados TI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel" aria-label="Simulador web do assistente">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Simulador Web</p>
            <h1>Assistente de Chamados TI</h1>
          </div>
          <button id="reset-button" class="secondary-button" type="button">
            Reiniciar
          </button>
        </header>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <label class="sr-only" for="message-input">Mensagem</label>
          <textarea
            id="message-input"
            name="message"
            rows="2"
            maxlength="1000"
            autocomplete="off"
            placeholder="Digite sua resposta..."
            required
          ></textarea>
          <button id="send-button" type="submit">Enviar</button>
        </form>
      </section>
    </main>

    <script src="/static/chat.js"></script>
  </body>
</html>
